# ===============================
# SPRING BOOT APPLICATION
# ===============================
spring.application.name=disaster-alert-system
server.port=8080

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/disaster_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# IMPORTANT: Use 'validate' or 'none' - NOT 'update'
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Add these for better ENUM handling
spring.jpa.properties.hibernate.type.preferred_instantiation_jdbc_type=OTHER
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# ===============================
# THYMELEAF TEMPLATE ENGINE
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.com.disaster=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# SECURITY (Disable for development)
# ===============================
spring.security.enabled=false

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

spring.main.allow-circular-references=true

# ===============================
# JPA ADDITIONAL SETTINGS
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true